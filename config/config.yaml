sources:
  openalex:
    base_url: "https://api.openalex.org/works"
    user_agent: "mailto:etl-pipeline@example.com"
    per_page: 25
    max_records: 50
    language: "en"
    timeout: 60
    enabled: true

  arxiv:
    base_url: "http://export.arxiv.org/api/query"
    categories: ["cs.AI", "cs.LG"]
    max_results: 50
    request_delay: 3
    timeout: 60
    enabled: true

  pubmed:
    query: "artificial intelligence OR machine learning"
    max_records: 50
    batch_size: 25
    request_delay: 0.4
    email: "etl-pipeline@example.com"
    tool_name: "science-etl"
    timeout: 60
    enabled: true

database:
  path: "data/science_etl.db"

etl:
  default_start_date: "2026-03-25"

retry:
  max_attempts: 3
  min_wait: 2
  max_wait: 30

logging:
  level: "INFO"
  log_file: "logs/etl.log"

telegram:
